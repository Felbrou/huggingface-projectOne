<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>🤗 Poem Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 60px auto;
            background: #f5f5f5;
            padding: 20px;
        }
        h1 { color: #ff6b35; }
        input {
            padding: 10px;
            width: 70%;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }
        button {
            padding: 10px 20px;
            background: #ff6b35;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        .poem-box {
            background: white;
            border-left: 4px solid #ff6b35;
            padding: 20px;
            margin-top: 30px;
            border-radius: 8px;
            white-space: pre-line;
            line-height: 1.8;
        }
    </style>
</head>
<body>
    <h1>🤗 AI Poem Generator</h1>
    <p>Powered by HuggingFace + Kimi-K2</p>

    <!-- Form sends POST to /generate -->
    <form action="/generate" method="post">
        <input 
            type="text" 
            name="topic" 
            placeholder="Enter a topic... (e.g. ocean, love, space)"
            required
        />
        <button type="submit">✨ Generate</button>
    </form>

    <!-- Only shows if a poem was generated -->
    {% if poem %}
    <div class="poem-box">
        <h3>📜 Poem about "{{ topic }}"</h3>
        <p>{{ poem }}</p>
    </div>
    {% endif %}

</body>
</html>
